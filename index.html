<!DOCTYPE html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <title>Головна</title>

    <link rel="stylesheet" href="styles.css" />
    <link rel="stylesheet" href="responsive.css" />
  </head>

  <body>
    <header class="site-header">
      <h1 id="typing">Мій сайт</h1>

      <button class="menu-toggle">☰</button>
      <button class="theme-toggle">🌙</button>

      <nav>
        <ul class="nav-list">
          <li><a href="index.html">Головна</a></li>
          <li><a href="about.html">Про мене</a></li>
          <li><a href="contact.html">Контакти</a></li>
        </ul>
      </nav>
    </header>

    <main class="container">
      <!-- ПОШУК -->
      <section class="section">
        <h2>Пошук</h2>
        <input class="search-box" placeholder="Пошук..." />
      </section>

      <!-- ФІЛЬТР + JSON КАРТКИ -->
      <section class="section">
        <h2>Сервіси</h2>

        <div class="filters">
          <button data-filter="all">Все</button>
          <button data-filter="development">Розробка</button>
          <button data-filter="design">Дизайн</button>
          <button data-filter="marketing">Маркетинг</button>
          <button data-filter="education">Навчання</button>
        </div>

        <!-- 🔥 ОЦЕ ГОЛОВНЕ (СЮДИ ВСТАВЛЯЄТЬСЯ JSON) -->
        <div class="services"></div>
      </section>

      <!-- FAQ -->
      <section class="section">
        <h2>FAQ</h2>

        <div class="accordion-item">
          <h3>HTML</h3>
          <p>Структура сайту</p>
        </div>

        <div class="accordion-item">
          <h3>CSS</h3>
          <p>Стилі</p>
        </div>
      </section>

      <!-- МОДАЛКА -->
      <section class="section">
        <button data-modal-open>Відкрити модалку</button>

        <div class="modal">
          <div class="modal-content">
            <button class="modal-close">X</button>
            <p>Це модальне вікно</p>
          </div>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <p>&copy; <span id="year"></span> Руслан</p>
    </footer>

    <button class="back-to-top" hidden>↑</button>

    <script src="js/main.js" defer></script>
  </body>
</html>
