      <nav>

    <main class="container">
      <form class="contact-form">
        <input name="name" placeholder="Ім’я" />
        <input name="email" placeholder="Email" />

      <div id="form-status"></div>

    </main>

    <footer class="site-footer">

    </footer>

    <button class="back-to-top" hidden>↑</button>
